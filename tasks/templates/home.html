{% extends 'base.html' %} {% block content %}

<div class="container mt-5">
  <div class="p-5 mb-4 bg-light rounded-3">
    <div class="container-fluid py-5">
      <h1 class="display-5 fw-bold">Welcome to Django Notes</h1>
      <p class="col-md-8 fs-4">Manage your tasks efficiently and stay organized.</p>
      {% if user.is_authenticated %}
      <a href="{% url 'tasks' %}" class="btn btn-primary btn-lg">View Tasks</a>
      {% else %}
      <a href="/signin" class="btn btn-primary btn-lg">Get Started</a>
      {% endif %}
    </div>
  </div>
</div>

{% endblock %}
