{% extends 'base.html' %}

{% block content %}

<div class="container mt-4">
  <div class="card">
    <div class="card-header">
      <h3 class="mb-0">Create Task</h3>
    </div>
    <div class="card-body">
      {% if error %}
      <div class="alert alert-danger" role="alert">
        {{error}}
      </div>
      {% endif %}

      <form action="/create_task/" method="POST">
        {% csrf_token %}
        {{form.as_p}}
        <button class="btn btn-primary">Save</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
